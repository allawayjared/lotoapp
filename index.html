<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="p-8 bg-slate-50">
    <h1 class="text-4xl font-bold mb-8">LOTO Pro</h1>
    
    <div class="flex gap-4 mb-8">
        <button onclick="switchTab(0)" class="px-6 py-3 bg-teal-700 text-white rounded">Dashboard</button>
        <button onclick="switchTab(1)" class="px-6 py-3 bg-teal-700 text-white rounded">Admin</button>
        <button onclick="switchTab(2)" class="px-6 py-3 bg-teal-700 text-white rounded">Perform LOTO</button>
    </div>

    <div id="content">Click a tab</div>

    <script>
        const BASE_URL = "https://lotoapp2.vercel.app";

        function switchTab(n) {
            const content = document.getElementById('content');
            if (n === 0) content.innerHTML = '<h2 class="text-2xl">Dashboard</h2><p>Welcome!</p>';
            if (n === 1) {
                content.innerHTML = `<button onclick="addEquipment()" class="bg-teal-700 text-white px-6 py-3 rounded">+ Add Equipment</button><div id="list" class="mt-6"></div>`;
                renderList();
            }
            if (n === 2) {
                content.innerHTML = `
                    <input id="idinput" placeholder="Equipment ID" class="border p-3 w-full rounded mb-4">
                    <button onclick="loadChecklist()" class="bg-emerald-600 text-white px-8 py-3 rounded">Load Checklist</button>
                `;
            }
        }

        function addEquipment() {
            alert("Add form would open here.");
            renderList();
        }

        function renderList() {
            document.getElementById('list').innerHTML = `
                <div class="border p-4 rounded">
                    Main Panel (CB-PANEL-01)
                    <button onclick="genQR('CB-PANEL-01')" class="ml-4 text-teal-600">Generate QR</button>
                </div>
            `;
        }

        function genQR(id) {
    const url = `${BASE_URL}/?equip=${id}`;
    const win = window.open("", "_blank");
    win.document.write(`
        <div style="padding:40px;text-align:center;font-family:sans-serif">
            <h2>QR Code for ${id}</h2>
            <div id="qr" style="margin:30px auto"></div>
            <p>Scan this with your phone</p>
        </div>
    `);
    new QRCode(win.document.getElementById("qr"), {
        text: url,
        width: 256,
        height: 256
    });
}

        function loadChecklist() {
            const id = document.getElementById('idinput').value || "CB-PANEL-01";
            document.getElementById('content').innerHTML = `
                <img src="https://picsum.photos/id/1015/800/600" class="w-full rounded mb-4">
                <h2 class="text-2xl">Checklist for ${id}</h2>
                <ul class="list-disc pl-6 mt-4 space-y-2">
                    <li>Notify affected employees</li>
                    <li>Isolate energy</li>
                    <li>Live-Dead-Live test</li>
                    <li>Don PPE</li>
                    <li>Perform work</li>
                    <li>Re-energize</li>
                </ul>
                <button onclick="completeLOTO()" class="mt-8 bg-emerald-600 text-white px-8 py-4 rounded w-full">Sign & Complete</button>
            `;
        }

        function completeLOTO() {
            alert("Signed! Report sent to EHS.");
        }
    </script>
</body>
</html>
