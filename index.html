<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTO Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        .nav-tab.active { background-color: #0f766e; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        canvas { border: 2px solid #e5e7eb; border-radius: 12px; background: white; touch-action: none; }
        .modal-body { max-height: 65vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50">
    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-teal-700 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-lock"></i></div>
                <h1 class="text-2xl font-semibold heading">LOTO Pro</h1>
            </div>
            <input id="currentUser" value="Alex Rivera" class="bg-slate-100 px-4 py-2 rounded-full text-sm w-40">
        </div>
    </header>

    <nav class="max-w-7xl mx-auto px-6 pt-6">
        <div class="flex gap-x-1 bg-white p-1 rounded-2xl w-fit border">
            <button onclick="switchTab(0)" class="nav-tab active px-6 py-3 rounded-xl text-sm font-medium">Dashboard</button>
            <button onclick="switchTab(1)" class="nav-tab px-6 py-3 rounded-xl text-sm font-medium">Admin</button>
            <button onclick="switchTab(2)" class="nav-tab px-6 py-3 rounded-xl text-sm font-medium">Perform LOTO</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div id="section-0" class="section active">
            <h2 class="text-3xl font-semibold heading mb-6">Dashboard</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-5 rounded-3xl border text-center">
                    <p class="text-sm text-slate-500">Equipment</p>
                    <p id="stat-equip" class="text-4xl font-bold text-teal-700">1</p>
                </div>
            </div>
        </div>

        <div id="section-1" class="section">
            <div class="flex justify-between mb-6">
                <h2 class="text-3xl font-semibold heading">Admin</h2>
                <button onclick="showAddModal()" class="bg-teal-700 text-white px-5 py-2.5 rounded-2xl text-sm font-medium">+ Add Equipment</button>
            </div>
            <div id="admin-list" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="section-2" class="section">
            <div id="perform-content" class="max-w-4xl mx-auto"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg max-h-[90vh] flex flex-col">
            <div class="p-6 border-b">
                <h3 id="modal-title" class="text-xl font-semibold">Add Equipment</h3>
            </div>
            <div class="modal-body p-6 overflow-y-auto flex-1 space-y-4">
                <div><label class="text-sm font-medium block mb-1">ID</label><input id="m-id" class="w-full border rounded-xl px-4 py-3"></div>
                <div><label class="text-sm font-medium block mb-1">Name</label><input id="m-name" class="w-full border rounded-xl px-4 py-3"></div>
                <div>
                    <label class="text-sm font-medium block mb-1">Photo</label>
                    <input type="file" id="m-photo" accept="image/*" class="hidden" onchange="previewPhoto(this)">
                    <button onclick="document.getElementById('m-photo').click()" class="px-4 py-2 border rounded-xl text-sm">Choose Photo</button>
                    <div id="m-photo-preview" class="hidden mt-3"><img id="m-photo-img" class="w-full rounded-xl border"></div>
                </div>
                <div><label class="text-sm font-medium block mb-1">PPE</label><textarea id="m-ppe" class="w-full border rounded-xl px-4 py-3" rows="2"></textarea></div>
                <div><label class="text-sm font-medium block mb-1">Steps (one per line)</label><textarea id="m-steps" class="w-full border rounded-xl px-4 py-3 font-mono text-sm" rows="6"></textarea></div>
            </div>
            <div class="p-4 border-t flex gap-3">
