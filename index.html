<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTO Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .nav-tab.active { background-color: #0f766e; color: white; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50">
    <header class="bg-white border-b p-4">
        <h1 class="text-3xl font-bold">LOTO Pro</h1>
    </header>

    <nav class="p-4 border-b flex gap-2 bg-white">
        <button onclick="switchTab(0)" class="nav-tab active px-6 py-3 rounded-xl">Dashboard</button>
        <button onclick="switchTab(1)" class="nav-tab px-6 py-3 rounded-xl">Admin</button>
        <button onclick="switchTab(2)" class="nav-tab px-6 py-3 rounded-xl">Perform LOTO</button>
    </nav>

    <div class="p-6 max-w-4xl mx-auto">
        <div id="section-0" class="section active">
            <h2 class="text-2xl font-bold">Dashboard</h2>
            <p class="mt-4">Welcome to LOTO Pro</p>
        </div>

        <div id="section-1" class="section">
            <button onclick="showAddModal()" class="bg-teal-700 text-white px-6 py-3 rounded-xl">+ Add Equipment</button>
            <div id="admin-list" class="mt-6"></div>
        </div>

        <div id="section-2" class="section">
            <div id="perform-content" class="bg-white rounded-3xl p-6"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md">
            <div class="p-6 border-b">
                <h3 id="modal-title" class="font-bold">Add Equipment</h3>
            </div>
            <div class="p-6 space-y-4">
                <input id="m-id" class="w-full border p-3 rounded" placeholder="ID e.g. CB-PANEL-01">
                <input id="m-name" class="w-full border p-3 rounded" placeholder="Equipment Name">
                <input type="file" id="m-photo" accept="image/*" onchange="previewPhoto(this)">
                <div id="photo-preview" class="hidden mt-2"><img id="preview-img" class="w-full rounded"></div>
                <textarea id="m-ppe" class="w-full border p-3 rounded" rows="2" placeholder="PPE requirements"></textarea>
                <textarea id="m-steps" class="w-full border p-3 rounded" rows="5" placeholder="Steps - one per line"></textarea>
            </div>
            <div class="p-4 border-t flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 border rounded-2xl">Cancel</button>
                <button onclick="saveEquipment()" class="flex-1 py-3 bg-teal-700 text-white rounded-2xl">Save</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://lotoapp2.vercel.app";
        let equipment = [];

        function switchTab(n) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + n).classList.remove('hidden');
            if (n === 1) renderAdmin();
        }

        function loadData() {
            equipment = [{
                id: "CB-PANEL-01",
                name: "Main 480V Distribution Panel",
                photo: "https://picsum.photos/id/1015/800/600",
                ppe: "Level 4 Arc Flash Suit",
                steps: ["Notify affected employees", "Isolate energy sources", "Verify isolation (Live-Dead-Live)", "Don PPE", "Perform work", "Re-energize safely"]
            }];
        }

        function renderAdmin() {
            const container = document.getElementById('admin-list');
            container.innerHTML = equipment.map(eq => `
                <div class="border p-4 rounded mb-4">
                    <img src="${eq.photo}" class="w-full h-48 object-cover rounded mb-3">
                    <div class="font-bold">${eq.name}</div>
                    <button onclick="showQR('${eq.id}')" class="text-teal-600 mt-2">Generate QR Code</button>
                </div>
            `).join('');
        }

        function showAddModal() {
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function previewPhoto(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('photo-preview').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveEquipment() {
            alert("Equipment saved successfully!");
            closeModal();
            renderAdmin();
        }

        function showQR(id) {
            const url = `${BASE_URL}/?equip=${id}`;
            alert("QR Code URL: " + url + "\n\nScan this to go straight to the checklist.");
        }

        window.onload = () => {
            loadData();
            renderAdmin();
            const id = new URLSearchParams(window.location.search).get('equip');
            if (id) {
                switchTab(2);
                document.getElementById('perform-content').innerHTML = `<h2 class="text-2xl">Checklist for ${id}</h2><p>Photo and full steps would appear here.</p>`;
            }
        };
    </script>
</body>
</html>
