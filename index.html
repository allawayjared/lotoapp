<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTO Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .nav-tab.active { background-color: #0f766e; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .modal-body { max-height: 60vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50">
    <header class="bg-white border-b p-4">
        <h1 class="text-2xl font-bold">LOTO Pro</h1>
    </header>

    <nav class="p-4 border-b flex gap-2">
        <button onclick="switchTab(0)" class="nav-tab active px-5 py-2 rounded">Dashboard</button>
        <button onclick="switchTab(1)" class="nav-tab px-5 py-2 rounded">Admin</button>
        <button onclick="switchTab(2)" class="nav-tab px-5 py-2 rounded">Perform LOTO</button>
    </nav>

    <div class="p-4">
        <div id="section-0" class="section active">Dashboard ready</div>
        <div id="section-1" class="section">
            <button onclick="showAddModal()" class="bg-teal-700 text-white px-6 py-3 rounded">+ Add Equipment</button>
            <div id="admin-list" class="mt-4"></div>
        </div>
        <div id="section-2" class="section">
            <div id="perform-area"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl w-full max-w-md flex flex-col max-h-[90vh]">
            <div class="p-5 border-b">
                <h3 id="modal-title" class="font-bold text-lg">Add Equipment</h3>
            </div>
            <div class="modal-body p-5 space-y-4 overflow-auto">
                <input id="m-id" placeholder="ID" class="w-full border p-3 rounded">
                <input id="m-name" placeholder="Name" class="w-full border p-3 rounded">
                <input type="file" id="m-photo" accept="image/*" onchange="preview(this)">
                <div id="preview" class="hidden"><img id="previmg" class="w-full rounded"></div>
                <textarea id="m-ppe" placeholder="PPE requirements" class="w-full border p-3 rounded" rows="2"></textarea>
                <textarea id="m-steps" placeholder="Steps - one per line" class="w-full border p-3 rounded" rows="6"></textarea>
            </div>
            <div class="p-4 border-t flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 border rounded-2xl">Cancel</button>
                <button onclick="saveItem()" class="flex-1 py-3 bg-teal-700 text-white rounded-2xl">Save</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://lotoapp2.vercel.app";
        let equipment = [];

        function switchTab(n) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + n).classList.remove('hidden');
            if (n === 1) renderAdmin();
        }

        function loadData() {
            equipment = [{id:"CB-PANEL-01", name:"Main Panel", photo:"https://picsum.photos/id/1015/800/600", ppe:"Level 4", steps:["Notify","Isolate","Verify","PPE","Work","Re-energize"]}];
        }

        function renderAdmin() {
            const div = document.getElementById('admin-list');
            div.innerHTML = equipment.map(e => `
                <div class="border p-4 rounded mb-3">
                    <img src="${e.photo}" class="w-full h-32 object-cover rounded">
                    <div class="font-bold">${e.name}</div>
                    <button onclick="genQR('${e.id}')" class="text-teal-600">QR Code</button>
                </div>
            `).join('');
        }

        function showAddModal() {
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function preview(input) {
            if (input.files[0]) {
                const r = new FileReader();
                r.onload = e => document.getElementById('previmg').src = e.target.result;
                r.readAsDataURL(input.files[0]);
                document.getElementById('preview').classList.remove('hidden');
            }
        }

        function saveItem() {
            alert("Saved (demo version)");
            closeModal();
            renderAdmin();
        }

        function genQR(id) {
            const url = `${BASE_URL}/?equip=${id}`;
            alert("QR would open: " + url + "\n\nScan this in real use.");
            // Full QR code window can be added if needed
        }

        window.onload = () => {
            loadData();
            renderAdmin();
            const id = new URLSearchParams(location.search).get('equip');
            if (id) {
                switchTab(2);
                document.getElementById('perform-area').innerHTML = `<p>Checklist for ${id} loaded.</p>`;
            }
        };
    </script>
</body>
</html>
